spring:
  config:
    activate:
      on-profile: dev
  
  datasource:
    url: jdbc:h2:mem:sistema_rendiciones;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      pool-name: HikariPool-SistemaRendiciones
      idle-timeout: 600000 # 10 minutos
      max-lifetime: 1800000 # 30 minutos
      connection-timeout: 30000 # 30 segundos
  
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    defer-datasource-initialization: true
